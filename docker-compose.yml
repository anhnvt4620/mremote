services:
  mremote:
    image: ghcr.io/anhnvt4620/mremote:latest
    container_name: mremote
    expose:
      - "2208"
    volumes:
      - mremote_data:/home/app/.mtermius
    environment:
      - NODE_ENV=production
      - PORT=2208
      - HOST=0.0.0.0
    command: ["node", "src/cli/index.js", "--no-tunnel"]
    restart: unless-stopped
    networks:
      - caddy_net

volumes:
  mremote_data:
    driver: local

networks:
  caddy_net:
    external: true
