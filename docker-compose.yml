services:
  mremote:
    image: ghcr.io/anhnvt4620/mremote:latest
    container_name: mremote
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=2208
      - HOST=0.0.0.0
      - HOME=/home/app
    command: ["node", "src/cli/index.js", "--no-tunnel"]
    volumes:
      - mremote_data:/home/app/.mtermius
    networks:
      - n8n_network

volumes:
  mremote_data:
    driver: local

networks:
  n8n_network:
    driver: bridge
