services:
  mremote:
    image: ghcr.io/anhnvt4620/mremote:latest
    container_name: mremote
    restart: unless-stopped
    user: "1000:1000"
    pid: "host"
    environment:
      - NODE_ENV=production
      - PORT=2208
      - HOST=0.0.0.0
      - HOME=/home/snow/tnhi
      - HOST_USER=snow
      - ROOT_DIR=/home/snow
      - MTERMIUS_SHELL=/home/app/host-shell
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
    volumes:
      - /home/snow/tnhi/.m-termius:/home/snow/tnhi/.m-termius
      - /home/snow:/home/snow
    networks:
      - n8n_network

networks:
  n8n_network:
    driver: bridge
