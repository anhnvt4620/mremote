services:
  mremote:
    image: ghcr.io/anhnvt4620/mremote:latest
    container_name: mremote
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=2208
      - HOST=0.0.0.0
      - HOME=/home/app
      - HOST_USER=snow
      - ROOT_DIR=/home/snow
      - MTERMIUS_SHELL=/home/app/host-shell
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      # Notification services (optional — uncomment to use)
      # - MREMOTE_TELEGRAM_BOT=123456:ABC-DEF1234gh
      # - MREMOTE_TELEGRAM_CHAT=-1001234567890
      # - MREMOTE_DISCORD_WEBHOOK=https://discord.com/api/webhooks/...
      # - MREMOTE_NOTIFY_WEBHOOK=https://your-webhook.com/notify
    volumes:
      - mremote_data:/home/app/.mtermius
      - /home/snow:/home/snow
      - ssh_key:/home/app/.ssh
    networks:
      - n8n_network

volumes:
  mremote_data:
    driver: local
  ssh_key:
    driver: local

networks:
  n8n_network:
    driver: bridge
