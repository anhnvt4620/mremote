services:
  mremote:
    image: ghcr.io/anhnvt4620/mremote:latest
    container_name: mremote
    restart: unless-stopped
    pid: "host"
    privileged: true
    environment:
      - NODE_ENV=production
      - PORT=2208
      - HOST=0.0.0.0
      - HOME=/home/app
      - HOST_USER=snow
      - ROOT_DIR=/home/snow
      - MTERMIUS_SHELL=/home/app/host-shell
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
    volumes:
      - mremote_data:/home/app/.mtermius
      - /home/snow:/home/snow
    networks:
      - n8n_network

volumes:
  mremote_data:
    driver: local

networks:
  n8n_network:
    driver: bridge
