services:
  mremote:
    image: ghcr.io/anhnvt4620/mremote:latest
    container_name: mremote
    ports:
      - "2208:2208"
    volumes:
      - mremote_data:/home/app/.mtermius
    environment:
      - NODE_ENV=production
      - PORT=2208
      - HOST=0.0.0.0
      # KHÔNG set MTERMIUS_NO_AUTH = auth bật, cần quét QR để vào
    restart: unless-stopped

volumes:
  mremote_data:
    driver: local
